[keyboard]
name = "chary"
product_name = "chary"
vendor_id = 0x4c4b
product_id = 0x4643
manufacturer = "RMK"
board = "nice!nano_v2"

[layout]
rows = 5
cols = 12
layers = 3
matrix_map = """
(0,0,L) (0,1,L) (0,2,L) (0,3,L) (0,4,L) (0,5,L)     (0,11,R) (0,10,R) (0,9,R) (0,8,R) (0,7,R) (0,6,R)
(1,0,L) (1,1,L) (1,2,L) (1,3,L) (1,4,L) (1,5,L)     (1,11,R) (1,10,R) (1,9,R) (1,8,R) (1,7,R) (1,6,R)
(2,0,L) (2,1,L) (2,2,L) (2,3,L) (2,4,L) (2,5,L)     (2,11,R) (2,10,R) (2,9,R) (2,8,R) (2,7,R) (2,6,R)
(3,0,L) (3,1,L) (3,2,L) (3,3,L) (3,4,L) (3,5,L)     (3,11,R) (3,10,R) (3,9,R) (3,8,R) (3,7,R) (3,6,R)
        (4,3,L) (4,4,L) (4,1,L) (4,5,L) (4,2,L)     (4,7,R) (4,9,R) (4,11,R)
"""

[aliases]
# Universal Layout mapping
SQuot = "Grave"
DQuot = "WM(Grave, LShift)"
Grave = "WM(Grave, RAlt)"
Pipe = "WM(Backslash, LShift)"
Backslash = "WM(Backslash, RAlt)"
Nbsp = "WM(Space, RAlt)"
Comma = "LeftBracket"
Semicolon = "WM(LeftBracket, LShift)"
Dot = "RightBracket"
Colon = "WM(RightBracket, LShift)"
Minus = "Minus"
Under = "WM(Minus, LShift)"
Equal = "Equal"
Plus = "WM(Equal, LShift)"
Slash = "Backslash"
LBracket = "Dot"
LBrace = "WM(Dot, LShift)"
RBracket = "Slash"
RBrace = "WM(Slash, LShift)"
Ampersand = "Comma"
Tilde = "Semicolon"
# One-shot Modifiers mapping
OSM_G = "OSM(LGui)"
OSM_A = "OSM(LAlt)"
OSM_C = "OSM(LCtrl)"
OSM_S = "OSM(LShift)"
# Window Management mapping
PrevSpace = "WM(Left,  LCtrl | LGui)"
NextSpace = "WM(Right, LCtrl | LGui)"
# Bluetooth profiles mapping
BT_1 = "User0"
BT_2 = "User1"
BT_3 = "User2"
BT_Next = "User3"
BT_Prev = "User4"
BT_Clear = "User5"
BT_Toggle = "User6" # Toggle between USB and BLE
# Trackball modes (handled in the patched RMK, emit no HID report themselves)
SCROLL = "User8" # Hold to scroll with the trackball
CARET = "User9"  # Hold to move the text caret with the trackball (arrow-key taps)


[[layer]] # 0
name = "base_layer"
keys = """
Escape     Kc1        Kc2        Kc3        Kc4        Kc5        Kc6        Kc7        Kc8        Kc9        Kc0         Delete
Tab        Q          W          E          R          T          Y          U          I          O          P           LeftBracket
RCtrl      A          S          D          F          G          H          J          K          L          Semicolon   Quote
LShift     Z          X          C          V          B          N          M          Comma      Dot        Slash       RightBracket
           MO(1)      Enter      LGui       LCtrl      Space      LAlt       MO(2)      Backspace
"""

[[layer]] # 1
name = "second_layer"
keys = """
Escape     F1         F2         F3         F4         F5         F6         F7         F8         F9         F10         Delete
Tab        Q          W          E          R          T          Y          U          I          O          P           LeftBracket
RCtrl      A          S          D          F          G          H          J          K          L          Semicolon   Quote
LShift     Z          X          C          V          B          N          M          Comma      Dot        Slash       RightBracket
           TRNS       Enter      LGui       LCtrl      Space      LAlt       TRNS        Backspace
"""

[[layer]] # 2
name = "mouse_layer"
keys = """
Escape     TRNS                     TRNS             TRNS                       TRNS             TRNS        TRNS   TRNS   TRNS   TRNS   TRNS   Delete
Tab        WM(MouseWheelUp,LCtrl)   MouseWheelUp     WM(MouseWheelDown,LCtrl)   MouseWheelDown   TRNS        TRNS   TRNS   TRNS   TRNS   TRNS   TRNS
RCtrl      MouseBtn4                MouseBtn2        MouseBtn3                  MouseBtn1        MouseBtn5   TRNS   TRNS   TRNS   TRNS   TRNS   TRNS
LShift     TRNS                     MouseWheelLeft   MouseWheelRight            TRNS             TRNS        TRNS   TRNS   TRNS   TRNS   TRNS   TRNS
           TRNS                     Enter            LGui                       LCtrl            Space       LAlt   TRNS   Backspace
"""


[ble]
enabled = true

[split]
connection = "ble"

# Dongle
[split.central]
rows = 0
cols = 0
row_offset = 0
col_offset = 0

[split.central.matrix]
row_pins = []
col_pins = []
# RMK uses col2row as the default matrix diode direction, if you want to use a row2col matrix, add `row2col = true`
# row2col = true

# Левая половина
[[split.peripheral]]
rows = 5
cols = 6
row_offset = 0
col_offset = 0

[split.peripheral.matrix]
row_pins = ["P0_31", "P1_15", "P0_24", "P0_22", "P1_06"]
col_pins = ["P0_02", "P0_29", "P0_09", "P1_00", "P0_11", "P1_04"]
row2col = true

# Правая половина
[[split.peripheral]]
rows = 5
cols = 6
row_offset = 0
col_offset = 6

[split.peripheral.matrix]
row_pins = ["P0_31", "P1_15", "P0_24", "P0_22", "P1_06"]
col_pins = ["P0_02", "P0_29", "P0_09", "P1_00", "P0_11", "P1_04"]
row2col = true

[rmk]
split_peripherals_num = 2

[[split.peripheral.input_device.pmw3610]]
name = "trackball0"

spi.instance = "bitbang0"
spi.sck = "P0_08"
spi.mosi = "P0_17"
spi.miso = "P0_17"
spi.cs = "P0_20"

motion = "P0_06"

force_awake = false
smart_mode = true
cpi = 800

swap_xy = true

invert_x = true
invert_y = true

[storage]
# Set `clear_storage` to true to clear all the stored info when the keyboard boots
clear_storage = false
num_sectors = 4

[host]
unlock_keys = [[0, 0], [0, 5]]